<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratulerer med konfirmasjonen, Linus</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100vh;
  overflow-x:hidden;
}
body{
  font-family:'Cormorant Garamond',Georgia,serif;
  background:radial-gradient(ellipse at top,#2d4a3e 0%,#1a2e26 60%,#0f1d18 100%);
  color:#f5e6c8;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
  position:relative;
  min-height:100vh;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(circle at 20% 30%,rgba(232,213,160,.12) 0%,transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(184,149,74,.10) 0%,transparent 45%);
  pointer-events:none;
  z-index:1;
}

.confetti{
  position:fixed;
  width:10px;
  height:14px;
  top:-20px;
  pointer-events:none;
  z-index:0;
  animation:fall linear infinite;
  border-radius:1px;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg)}
}

.card{
  position:relative;
  z-index:2;
  text-align:center;
  padding:3.5rem 2rem 3rem;
  max-width:520px;
  width:100%;
}

.card::before,
.card::after{
  content:'';
  position:absolute;
  left:50%;
  width:1px;
  background:linear-gradient(to bottom,transparent,rgba(212,181,106,.6),transparent);
}
.card::before{top:0;height:60px;transform:translateX(-50%)}
.card::after{bottom:0;height:60px;transform:translateX(-50%)}

.ornament{
  font-size:1rem;
  letter-spacing:.6em;
  color:#d4b56a;
  margin-bottom:1.25rem;
  padding-left:.6em;
  opacity:0;
  animation:fadeIn 1s .2s forwards;
}

.greeting{
  font-style:italic;
  font-weight:500;
  font-size:clamp(1.6rem,5vw,2.4rem);
  color:#e8d5a0;
  letter-spacing:.02em;
  line-height:1.2;
  margin-bottom:.4rem;
  opacity:0;
  animation:fadeIn 1s .5s forwards;
}

.greeting-2{
  font-style:italic;
  font-weight:500;
  font-size:clamp(1.6rem,5vw,2.4rem);
  color:#e8d5a0;
  letter-spacing:.02em;
  line-height:1.2;
  margin-bottom:1.75rem;
  opacity:0;
  animation:fadeIn 1s .8s forwards;
}

.name{
  font-style:italic;
  font-weight:600;
  font-size:clamp(2.2rem,7vw,3.2rem);
  color:#fff8e7;
  margin-bottom:.5rem;
  text-shadow:0 0 30px rgba(232,213,160,.3);
  opacity:0;
  animation:fadeIn 1s 1.2s forwards;
}

.divider{
  width:80px;
  height:1px;
  background:linear-gradient(to right,transparent,#d4b56a,transparent);
  margin:1.5rem auto 2rem;
  position:relative;
  opacity:0;
  animation:expand 1s 1.6s forwards;
}
.divider::before{
  content:'❦';
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1a2e26;
  padding:0 .8rem;
  color:#b8954a;
  font-size:1.2rem;
}
@keyframes expand{
  from{opacity:0;width:0}
  to{opacity:1;width:80px}
}

.amount-label{
  font-style:italic;
  font-size:.95rem;
  color:rgba(212,181,106,.85);
  letter-spacing:.25em;
  text-transform:uppercase;
  margin-bottom:1rem;
  opacity:0;
  animation:fadeIn 1s 1.9s forwards;
}

.amount{
  font-weight:700;
  font-size:clamp(3.5rem,13vw,5.8rem);
  color:#e8d5a0;
  line-height:1;
  letter-spacing:-.02em;
  text-shadow:0 0 60px rgba(232,213,160,.4);
  margin-bottom:.4rem;
  opacity:0;
  transform:scale(.4);
  animation:zoomIn 1.2s 2.2s forwards;
}
.amount .kr{
  font-size:.3em;
  font-weight:400;
  color:#d4b56a;
  margin-left:.4rem;
  letter-spacing:.05em;
  vertical-align:super;
}
@keyframes zoomIn{
  to{opacity:1;transform:scale(1)}
}

.from-label{
  font-style:italic;
  font-size:.85rem;
  color:rgba(212,181,106,.7);
  letter-spacing:.3em;
  text-transform:uppercase;
  margin-top:2.5rem;
  margin-bottom:.85rem;
  opacity:0;
  animation:fadeIn 1s 3s forwards;
}

.from{
  font-style:italic;
  font-size:clamp(1.25rem,3.8vw,1.6rem);
  color:#f5e6c8;
  font-weight:500;
  line-height:1.5;
  opacity:0;
  animation:fadeIn 1s 3.3s forwards;
}

@keyframes fadeIn{to{opacity:1}}

.sparkle{
  position:absolute;
  color:#e8d5a0;
  font-size:1.2rem;
  pointer-events:none;
  z-index:1;
  animation:twinkle 3s ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(.5)}
  50%{opacity:1;transform:scale(1)}
}
.s1{top:15%;left:8%;animation-delay:0s}
.s2{top:25%;right:10%;animation-delay:.8s}
.s3{bottom:25%;left:12%;animation-delay:1.6s}
.s4{bottom:18%;right:8%;animation-delay:2.4s}
.s5{top:50%;left:5%;animation-delay:1.2s}
.s6{top:60%;right:6%;animation-delay:2s}

@media(max-width:480px){
  .sparkle{font-size:1rem}
}
</style>
</head>
<body>

<div class="sparkle s1">✦</div>
<div class="sparkle s2">✧</div>
<div class="sparkle s3">✦</div>
<div class="sparkle s4">✧</div>
<div class="sparkle s5">✦</div>
<div class="sparkle s6">✧</div>

<div class="card">
  <div class="ornament">✦ ❦ ✦</div>

  <div class="greeting">Gratulerer med</div>
  <div class="greeting-2">konfirmasjonen</div>

  <div class="name">Linus</div>

  <div class="divider"></div>

  <div class="amount-label">Du har fått</div>

  <div class="amount">10 000<span class="kr">kr</span></div>

  <div class="from-label">Fra</div>

  <div class="from">Pappa, Filip<br>og Guro</div>
</div>

<script>
const colors = ['#b8954a','#d4b56a','#e8d5a0','#f5e6c8','#fff8e7'];
for (let i = 0; i < 50; i++){
  const c = document.createElement('div');
  c.className = 'confetti';
  c.style.left = Math.random() * 100 + '%';
  c.style.background = colors[i % colors.length];
  c.style.animationDuration = (3 + Math.random() * 3) + 's';
  c.style.animationDelay = (Math.random() * 4) + 's';
  c.style.opacity = .6 + Math.random() * .4;
  c.style.transform = 'rotate(' + (Math.random()*360) + 'deg)';
  document.body.appendChild(c);
}
</script>

</body>
</html>
